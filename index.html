<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1e1e1e">
    <title>ProCode Editor</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #1e1e1e;
            --header: #252526;
            --accent: #007acc;
            --border: #3e3e42;
            --text: #d4d4d4;
            --text-muted: #858585;
            --tab-bg: #2d2d2d;
            --tab-active: #1e1e1e;
            --button: #0e639c;
        }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
        }

        /* Header - Çentik destekli */
        #header {
            background: var(--header);
            border-bottom: 1px solid var(--border);
            padding: 8px 12px;
            padding-top: max(12px, env(safe-area-inset-top));
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
            z-index: 100;
        }

        #filename {
            flex: 1;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
            font-size: 14px;
            padding: 6px 10px;
            border-radius: 6px;
            outline: none;
        }

        #filename:focus {
            border-color: var(--accent);
        }

        .icon-btn {
            width: 34px;
            height: 34px;
            border: none;
            border-radius: 6px;
            background: var(--button);
            color: white;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn.secondary {
            background: transparent;
            border: 1px solid var(--border);
        }

        /* Sekmeler - Çalışan haliyle */
        #tabs-container {
            background: var(--tab-bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            overflow-x: auto;
            scrollbar-width: none;
            flex-shrink: 0;
        }

        #tabs-container::-webkit-scrollbar {
            display: none;
        }

        .tab {
            padding: 10px 16px;
            font-size: 13px;
            background: var(--tab-bg);
            border-right: 1px solid var(--border);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
            user-select: none;
            max-width: 150px;
        }

        .tab.active {
            background: var(--tab-active);
            border-bottom: 2px solid var(--accent);
            font-weight: 600;
        }

        .tab-close {
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            font-size: 15px;
            margin-left: 4px;
        }

        .tab-close:active {
            background: rgba(255,255,255,0.2);
        }

        #new-tab-btn {
            padding: 10px 16px;
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 20px;
            cursor: pointer;
        }

        /* Editor Alanı */
        #editor-area {
            flex: 1;
            display: flex;
            overflow: hidden;
            position: relative;
            margin-bottom: calc(44px + env(safe-area-inset-bottom));
        }

        textarea {
            flex: 1;
            width: 100%;
            height: 100%;
            border: none;
            padding: 12px;
            font-family: 'Menlo', 'Monaco', monospace;
            font-size: 14px;
            line-height: 1.5;
            background: var(--bg);
            color: var(--text);
            resize: none;
            outline: none;
            tab-size: 4;
        }

        /* Toolbar - Klavye üstünde sabit */
        #toolbar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 44px;
            background: var(--header);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 8px;
            gap: 6px;
            overflow-x: auto;
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 1000;
        }

        #toolbar::-webkit-scrollbar {
            display: none;
        }

        .tool-btn {
            height: 32px;
            padding: 0 12px;
            background: #3c3c3c;
            border: 1px solid #505050;
            color: white;
            border-radius: 6px;
            font-family: monospace;
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
        }

        .tool-btn:active {
            background: var(--accent);
        }

        /* Menü - Düzgün konumlu */
        #menu-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            z-index: 2000;
        }

        #menu-overlay.show {
            display: block;
        }

        #menu {
            position: fixed;
            top: calc(env(safe-area-inset-top) + 50px);
            right: 10px;
            background: #2d2d2d;
            border: 1px solid var(--border);
            border-radius: 12px;
            min-width: 220px;
            max-height: 80vh;
            overflow-y: auto;
            display: none;
            flex-direction: column;
            z-index: 2001;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #menu.show {
            display: flex;
        }

        .menu-item {
            padding: 14px 16px;
            font-size: 15px;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border);
            color: var(--text);
            text-align: left;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .menu-item:last-child {
            border-bottom: none;
        }

        .menu-item:active {
            background: var(--accent);
        }

        .menu-item.red {
            color: #ff6b6b;
        }

        /* Arama */
        #search-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #2d2d2d;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            width: 90%;
            max-width: 340px;
            display: none;
            flex-direction: column;
            gap: 12px;
            z-index: 3000;
        }

        #search-modal.show {
            display: flex;
        }

        .search-input {
            width: 100%;
            padding: 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
            font-size: 16px;
        }

        .search-row {
            display: flex;
            gap: 8px;
        }

        .search-btn {
            flex: 1;
            padding: 10px;
            background: #3c3c3c;
            border: 1px solid #505050;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }

        .search-btn.primary {
            background: var(--accent);
        }

        /* Önizleme */
        #preview-modal {
            position: fixed;
            inset: 0;
            background: white;
            display: none;
            flex-direction: column;
            z-index: 4000;
        }

        #preview-modal.show {
            display: flex;
        }

        #preview-header {
            height: 50px;
            background: var(--header);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            padding-top: env(safe-area-inset-top);
        }

        #preview-frame {
            flex: 1;
            border: none;
            background: white;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="app">
        <div id="header">
            <input type="text" id="filename" value="new.txt">
            <button class="icon-btn secondary" id="menu-btn">☰</button>
            <button class="icon-btn" id="preview-btn">▶</button>
        </div>

        <div id="tabs-container">
            <!-- Sekmeler buraya -->
            <button id="new-tab-btn">+</button>
        </div>

        <div id="editor-area">
            <textarea id="editor" spellcheck="false" autocapitalize="off"></textarea>
        </div>
    </div>

    <!-- Toolbar -->
    <div id="toolbar">
        <button class="tool-btn" data-char="\t">Tab</button>
        <button class="tool-btn" data-char="<">&lt;</button>
        <button class="tool-btn" data-char=">">&gt;</button>
        <button class="tool-btn" data-char="/">/</button>
        <button class="tool-btn" data-char="{">{</button>
        <button class="tool-btn" data-char="}">}</button>
        <button class="tool-btn" data-char="(">(</button>
        <button class="tool-btn" data-char=")">)</button>
        <button class="tool-btn" data-char=";">;</button>
        <button class="tool-btn" data-char="=">=</button>
        <button class="tool-btn" data-char='"'>"</button>
    </div>

    <!-- Menü -->
    <div id="menu-overlay"></div>
    <div id="menu">
        <button class="menu-item" data-action="open">Aç...</button>
        <button class="menu-item" data-action="open-zip">ZIP Aç...</button>
        <button class="menu-item" data-action="save">Kaydet</button>
        <button class="menu-item" data-action="save-zip">ZIP Kaydet</button>
        <button class="menu-item" data-action="undo">Geri Al</button>
        <button class="menu-item" data-action="redo">İleri Al</button>
        <button class="menu-item" data-action="search">Bul/Değiştir</button>
        <button class="menu-item" data-action="select-all">Tümünü Seç</button>
        <button class="menu-item red" data-action="clear">Tümünü Sil</button>
    </div>

    <!-- Arama -->
    <div id="menu-overlay" class="hidden" id="search-overlay"></div>
    <div id="search-modal">
        <input type="text" class="search-input" id="find-input" placeholder="Ara...">
        <input type="text" class="search-input" id="replace-input" placeholder="Değiştir...">
        <div class="search-row">
            <button class="search-btn" id="close-search">Kapat</button>
            <button class="search-btn" id="prev-btn">Önceki</button>
            <button class="search-btn primary" id="next-btn">Sonraki</button>
        </div>
        <div class="search-row">
            <button class="search-btn" id="replace-btn">Değiştir</button>
            <button class="search-btn primary" id="replace-all-btn">Tümünü Değiştir</button>
        </div>
    </div>

    <!-- Önizleme -->
    <div id="preview-modal">
        <div id="preview-header">
            <b>Önizleme</b>
            <button class="icon-btn" id="close-preview">Kapat</button>
        </div>
        <iframe id="preview-frame"></iframe>
    </div>

    <input type="file" id="file-input" accept=".txt,.html,.js,.css,.json,.md,.py,.php,.zip" style="display:none">
    <input type="file" id="zip-input" accept=".zip" style="display:none">

    <script>
        // Uygulama State
        const App = {
            tabs: [],
            activeTab: null,
            tabIdCounter: 0,
            history: new Map(),
            zipFile: null,
            
            init() {
                this.cacheDOM();
                this.bindEvents();
                this.newTab();
                this.registerSW();
            },
            
            cacheDOM() {
                this.dom = {
                    editor: document.getElementById('editor'),
                    filename: document.getElementById('filename'),
                    tabsContainer: document.getElementById('tabs-container'),
                    newTabBtn: document.getElementById('new-tab-btn'),
                    menu: document.getElementById('menu'),
                    menuOverlay: document.getElementById('menu-overlay'),
                    searchModal: document.getElementById('search-modal'),
                    previewModal: document.getElementById('preview-modal'),
                    previewFrame: document.getElementById('preview-frame'),
                    findInput: document.getElementById('find-input'),
                    replaceInput: document.getElementById('replace-input'),
                    fileInput: document.getElementById('file-input'),
                    zipInput: document.getElementById('zip-input')
                };
            },
            
            bindEvents() {
                // Sekme oluştur
                this.dom.newTabBtn.addEventListener('click', () => this.newTab());
                
                // Dosya adı değişimi
                this.dom.filename.addEventListener('change', (e) => {
                    const tab = this.getActiveTab();
                    if(tab) {
                        tab.name = e.target.value;
                        this.renderTabs();
                    }
                });
                
                // Editor input
                this.dom.editor.addEventListener('input', () => {
                    const tab = this.getActiveTab();
                    if(tab) {
                        tab.content = this.dom.editor.value;
                        tab.modified = true;
                        this.debounceHistory();
                        this.renderTabs();
                    }
                });
                
                // Toolbar butonları
                document.querySelectorAll('.tool-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const char = btn.dataset.char;
                        if(char === '\\t') this.insertText('\t');
                        else this.insertText(char);
                    });
                });
                
                // Menü aç/kapat
                document.getElementById('menu-btn').addEventListener('click', () => this.toggleMenu());
                this.dom.menuOverlay.addEventListener('click', () => this.toggleMenu());
                
                // Menü öğeleri
                this.dom.menu.addEventListener('click', (e) => {
                    const item = e.target.closest('.menu-item');
                    if(item) this.handleMenuAction(item.dataset.action);
                });
                
                // Arama
                document.getElementById('close-search').addEventListener('click', () => this.closeSearch());
                document.getElementById('next-btn').addEventListener('click', () => this.findNext());
                document.getElementById('prev-btn').addEventListener('click', () => this.findPrev());
                document.getElementById('replace-btn').addEventListener('click', () => this.replaceOne());
                document.getElementById('replace-all-btn').addEventListener('click', () => this.replaceAll());
                
                // Önizleme
                document.getElementById('preview-btn').addEventListener('click', () => this.togglePreview());
                document.getElementById('close-preview').addEventListener('click', () => this.togglePreview());
                
                // Dosya inputları
                this.dom.fileInput.addEventListener('change', (e) => this.handleFile(e.target.files[0]));
                this.dom.zipInput.addEventListener('change', (e) => this.handleZipFile(e.target.files[0]));
                
                // Klavye kısayolları
                document.addEventListener('keydown', (e) => {
                    if((e.ctrlKey || e.metaKey) && e.key === 's') {
                        e.preventDefault();
                        this.saveFile();
                    }
                    if((e.ctrlKey || e.metaKey) && e.key === 'o') {
                        e.preventDefault();
                        this.openFile();
                    }
                    if((e.ctrlKey || e.metaKey) && e.key === 'f') {
                        e.preventDefault();
                        this.openSearch();
                    }
                });
            },
            
            newTab(name = 'new.txt', content = '') {
                this.tabIdCounter++;
                const tab = {
                    id: this.tabIdCounter,
                    name: name,
                    content: content,
                    modified: false
                };
                this.tabs.push(tab);
                this.history.set(tab.id, {stack: [content], index: 0});
                this.switchTab(tab.id);
            },
            
            switchTab(id) {
                // Mevcut içeriği kaydet
                const current = this.getActiveTab();
                if(current) current.content = this.dom.editor.value;
                
                this.activeTab = id;
                const tab = this.tabs.find(t => t.id === id);
                if(!tab) return;
                
                this.dom.editor.value = tab.content;
                this.dom.filename.value = tab.name;
                this.renderTabs();
            },
            
            closeTab(id) {
                if(this.tabs.length <= 1) return;
                
                this.tabs = this.tabs.filter(t => t.id !== id);
                this.history.delete(id);
                
                if(this.activeTab === id) {
                    this.switchTab(this.tabs[this.tabs.length - 1].id);
                } else {
                    this.renderTabs();
                }
            },
            
            renderTabs() {
                // Mevcut sekmeleri temizle (new-tab-btn hariç)
                const existingTabs = this.dom.tabsContainer.querySelectorAll('.tab');
                existingTabs.forEach(t => t.remove());
                
                // Sekmeleri oluştur
                this.tabs.forEach(tab => {
                    const div = document.createElement('div');
                    div.className = 'tab' + (tab.id === this.activeTab ? ' active' : '');
                    div.innerHTML = `
                        <span>${tab.name}${tab.modified ? ' •' : ''}</span>
                        <span class="tab-close" data-id="${tab.id}">×</span>
                    `;
                    
                    div.addEventListener('click', (e) => {
                        if(e.target.classList.contains('tab-close')) {
                            e.stopPropagation();
                            this.closeTab(tab.id);
                        } else {
                            this.switchTab(tab.id);
                        }
                    });
                    
                    this.dom.tabsContainer.insertBefore(div, this.dom.newTabBtn);
                });
            },
            
            getActiveTab() {
                return this.tabs.find(t => t.id === this.activeTab);
            },
            
            insertText(text) {
                const ed = this.dom.editor;
                const start = ed.selectionStart;
                const end = ed.selectionEnd;
                ed.setRangeText(text, start, end, 'end');
                ed.focus();
                ed.dispatchEvent(new Event('input'));
            },
            
            debounceHistory() {
                clearTimeout(this.historyTimer);
                this.historyTimer = setTimeout(() => this.saveHistory(), 500);
            },
            
            saveHistory() {
                const tab = this.getActiveTab();
                if(!tab) return;
                
                const h = this.history.get(tab.id);
                if(h.stack[h.index] === this.dom.editor.value) return;
                
                if(h.index < h.stack.length - 1) {
                    h.stack = h.stack.slice(0, h.index + 1);
                }
                h.stack.push(this.dom.editor.value);
                h.index++;
                if(h.stack.length > 30) { h.stack.shift(); h.index--; }
            },
            
            undo() {
                const tab = this.getActiveTab();
                if(!tab) return;
                const h = this.history.get(tab.id);
                if(h.index > 0) {
                    h.index--;
                    this.dom.editor.value = h.stack[h.index];
                    tab.content = h.stack[h.index];
                    this.renderTabs();
                }
            },
            
            redo() {
                const tab = this.getActiveTab();
                if(!tab) return;
                const h = this.history.get(tab.id);
                if(h.index < h.stack.length - 1) {
                    h.index++;
                    this.dom.editor.value = h.stack[h.index];
                    tab.content = h.stack[h.index];
                    this.renderTabs();
                }
            },
            
            toggleMenu() {
                const isOpen = this.dom.menu.classList.contains('show');
                this.dom.menu.classList.toggle('show', !isOpen);
                this.dom.menuOverlay.classList.toggle('show', !isOpen);
            },
            
            handleMenuAction(action) {
                this.toggleMenu();
                switch(action) {
                    case 'open': this.openFile(); break;
                    case 'open-zip': this.openZip(); break;
                    case 'save': this.saveFile(); break;
                    case 'save-zip': this.saveAsZip(); break;
                    case 'undo': this.undo(); break;
                    case 'redo': this.redo(); break;
                    case 'search': this.openSearch(); break;
                    case 'select-all': 
                        this.dom.editor.select(); 
                        this.dom.editor.focus();
                        break;
                    case 'clear': 
                        if(confirm('Tüm içerik silinsin mi?')) {
                            this.dom.editor.value = '';
                            this.dom.editor.dispatchEvent(new Event('input'));
                        }
                        break;
                }
            },
            
            openFile() {
                this.dom.fileInput.click();
            },
            
            openZip() {
                this.dom.zipInput.click();
            },
            
            handleFile(file) {
                if(!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    this.newTab(file.name, e.target.result);
                };
                reader.readAsText(file);
                this.dom.fileInput.value = '';
            },
            
            async handleZipFile(file) {
                if(!file) return;
                try {
                    const zip = await JSZip.loadAsync(file);
                    this.zipFile = zip;
                    const files = Object.keys(zip.files).filter(f => !zip.files[f].dir);
                    if(files.length > 0) {
                        const content = await zip.files[files[0]].async('string');
                        this.newTab(files[0], content);
                    }
                } catch(e) { alert('ZIP hatası'); }
                this.dom.zipInput.value = '';
            },
            
            saveFile() {
                const tab = this.getActiveTab();
                if(!tab) return;
                const blob = new Blob([this.dom.editor.value], {type: 'text/plain'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = tab.name;
                a.click();
                URL.revokeObjectURL(url);
                tab.modified = false;
                this.renderTabs();
            },
            
            async saveAsZip() {
                const tab = this.getActiveTab();
                if(!tab) return;
                const zip = new JSZip();
                zip.file(tab.name, this.dom.editor.value);
                const blob = await zip.generateAsync({type: 'blob'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = tab.name.replace(/\.[^/.]+$/, '') + '.zip';
                a.click();
                URL.revokeObjectURL(url);
            },
            
            openSearch() {
                this.dom.searchModal.classList.add('show');
                this.dom.findInput.focus();
            },
            
            closeSearch() {
                this.dom.searchModal.classList.remove('show');
            },
            
            findNext() {
                const text = this.dom.findInput.value;
                if(!text) return;
                const content = this.dom.editor.value;
                const start = this.dom.editor.selectionEnd;
                let idx = content.indexOf(text, start);
                if(idx === -1) idx = content.indexOf(text);
                if(idx === -1) return;
                
                this.dom.editor.setSelectionRange(idx, idx + text.length);
                this.dom.editor.focus();
                this.dom.editor.scrollTop = (content.substring(0, idx).split('\n').length - 1) * 21 - 100;
            },
            
            findPrev() {
                const text = this.dom.findInput.value;
                if(!text) return;
                const content = this.dom.editor.value;
                let idx = content.lastIndexOf(text, this.dom.editor.selectionStart - 1);
                if(idx === -1) idx = content.lastIndexOf(text);
                if(idx === -1) return;
                
                this.dom.editor.setSelectionRange(idx, idx + text.length);
                this.dom.editor.focus();
            },
            
            replaceOne() {
                const find = this.dom.findInput.value;
                const replace = this.dom.replaceInput.value;
                const selected = this.dom.editor.value.substring(
                    this.dom.editor.selectionStart, 
                    this.dom.editor.selectionEnd
                );
                if(selected === find) {
                    this.insertText(replace);
                }
                this.findNext();
            },
            
            replaceAll() {
                const find = this.dom.findInput.value;
                const replace = this.dom.replaceInput.value;
                const regex = new RegExp(find.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'g');
                this.dom.editor.value = this.dom.editor.value.replace(regex, replace);
                this.dom.editor.dispatchEvent(new Event('input'));
            },
            
            togglePreview() {
                const isOpen = this.dom.previewModal.classList.contains('show');
                if(!isOpen) {
                    const name = this.dom.filename.value;
                    const content = this.dom.editor.value;
                    if(name.match(/\.(html|htm)$/i)) {
                        this.dom.previewFrame.srcdoc = content;
                    } else {
                        this.dom.previewFrame.srcdoc = `<pre style="padding:20px;font-family:monospace;white-space:pre-wrap;">${content.replace(/</g,'&lt;')}</pre>`;
                    }
                    this.dom.previewModal.classList.add('show');
                } else {
                    this.dom.previewModal.classList.remove('show');
                }
            },
            
            registerSW() {
                if('serviceWorker' in navigator) {
                    navigator.serviceWorker.register('sw.js');
                }
            }
        };
        
        App.init();
    </script>
</body>
</html>
