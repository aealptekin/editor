<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>ProCode Editor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #1e1e1e;
            --header: #252526;
            --accent: #007acc;
            --border: #3e3e42;
            --text: #d4d4d4;
            --text-muted: #858585;
            --tab-bg: #2d2d2d;
            --tab-active: #1e1e1e;
            --button: #0e639c;
            --editor-font: 'Menlo', 'Monaco', 'Courier New', monospace;
            --font-size: 14px;
            --header-h: 36px;
            --tab-h: 32px;
            --toolbar-h: 40px;
        }

        .light {
            --bg: #ffffff;
            --header: #f3f3f3;
            --accent: #0078d4;
            --border: #e0e0e0;
            --text: #333333;
            --text-muted: #808080;
            --tab-bg: #ececec;
            --tab-active: #ffffff;
            --button: #0078d4;
        }

        html, body {
            height: 100%;
            height: 100dvh;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
        }

        /* Ana Layout */
        .app {
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
        }

        /* Header - Kompakt */
        .header {
            height: var(--header-h);
            background: var(--header);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 10px;
            gap: 8px;
            flex-shrink: 0;
        }

        .logo {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            margin-right: 4px;
        }

        .filename-input {
            flex: 1;
            background: transparent;
            border: 1px solid transparent;
            color: var(--text);
            font-size: 13px;
            padding: 4px 6px;
            border-radius: 4px;
            outline: none;
            min-width: 0;
        }

        .filename-input:focus {
            border-color: var(--accent);
            background: var(--bg);
        }

        .header-btns {
            display: flex;
            gap: 6px;
        }

        .btn {
            height: 26px;
            padding: 0 10px;
            border: none;
            border-radius: 4px;
            background: var(--button);
            color: white;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn:active {
            opacity: 0.8;
        }

        .btn.secondary {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
        }

        /* Sekmeler - Kompakt */
        .tabs-bar {
            height: var(--tab-h);
            background: var(--tab-bg);
            display: flex;
            overflow-x: auto;
            scrollbar-width: none;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .tabs-bar::-webkit-scrollbar {
            display: none;
        }

        .tab {
            padding: 0 12px;
            height: 100%;
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--tab-bg);
            border-right: 1px solid var(--border);
            cursor: pointer;
            font-size: 12px;
            max-width: 140px;
            min-width: 80px;
            position: relative;
        }

        .tab.active {
            background: var(--tab-active);
            border-bottom: 2px solid var(--accent);
        }

        .tab-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .tab-close {
            width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 3px;
            font-size: 14px;
            line-height: 1;
            margin-left: 4px;
        }

        .tab-close:active {
            background: var(--danger);
            color: white;
        }

        .new-tab-btn {
            width: 32px;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 18px;
            cursor: pointer;
            flex-shrink: 0;
        }

        /* Editor Alanı */
        .editor-area {
            flex: 1;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        .line-numbers {
            width: 36px;
            background: var(--bg);
            border-right: 1px solid var(--border);
            padding: 8px 4px;
            font-family: var(--editor-font);
            font-size: var(--font-size);
            line-height: 1.5;
            color: var(--text-muted);
            text-align: right;
            overflow: hidden;
            user-select: none;
            flex-shrink: 0;
        }

        .editor-wrap {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        textarea {
            width: 100%;
            height: 100%;
            border: none;
            outline: none;
            padding: 8px;
            font-family: var(--editor-font);
            font-size: var(--font-size);
            line-height: 1.5;
            background: var(--bg);
            color: var(--text);
            resize: none;
            tab-size: 4;
            -webkit-user-select: text;
            user-select: text;
            white-space: pre;
            overflow: auto;
        }

        textarea::selection {
            background: rgba(0, 122, 204, 0.4);
        }

        /* Scrollbar */
        textarea::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        textarea::-webkit-scrollbar-track {
            background: transparent;
        }

        textarea::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 5px;
            border: 2px solid var(--bg);
        }

        textarea::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        /* Toolbar - Klavye Üstünde Sabit */
        .toolbar-container {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--header);
            border-top: 1px solid var(--border);
            z-index: 100;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .toolbar {
            height: var(--toolbar-h);
            display: flex;
            gap: 4px;
            padding: 4px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .toolbar::-webkit-scrollbar {
            display: none;
        }

        .tool-btn {
            height: 32px;
            padding: 0 12px;
            background: var(--tab-bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            font-family: var(--editor-font);
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
        }

        .tool-btn:active {
            background: var(--accent);
            color: white;
        }

        /* Yüzen Navigasyon - Focus Kaybettirmez */
        .nav-float {
            position: fixed;
            right: 10px;
            bottom: calc(var(--toolbar-h) + 10px + env(safe-area-inset-bottom));
            display: flex;
            flex-direction: column;
            gap: 6px;
            z-index: 90;
        }

        .nav-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--accent);
            color: white;
            border: none;
            font-size: 16px;
            cursor: pointer;
            opacity: 0.9;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Focus'u engelle - klavye açılmasın */
            user-select: none;
            -webkit-user-select: none;
        }

        .nav-btn:active {
            opacity: 1;
            transform: scale(0.95);
        }

        /* Menü - Küçük Font */
        .menu-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            z-index: 1000;
        }

        .menu-overlay.show {
            display: block;
        }

        .menu {
            position: absolute;
            top: var(--header-h);
            right: 10px;
            background: var(--header);
            border: 1px solid var(--border);
            border-radius: 6px;
            min-width: 180px;
            max-height: 70vh;
            overflow-y: auto;
            display: none;
            flex-direction: column;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        .menu.show {
            display: flex;
        }

        .menu-item {
            padding: 10px 14px;
            font-size: 13px; /* Küçük font */
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border);
            color: var(--text);
            text-align: left;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .menu-item:last-child {
            border-bottom: none;
        }

        .menu-item:active {
            background: var(--accent);
            color: white;
        }

        .menu-item.danger {
            color: #f48771;
        }

        .key-hint {
            font-size: 11px;
            color: var(--text-muted);
            margin-left: 12px;
        }

        .menu-item:active .key-hint {
            color: rgba(255,255,255,0.7);
        }

        /* Arama - Ekran Merkezinde */
        .search-box {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--header);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            width: 90%;
            max-width: 320px;
            display: none;
            flex-direction: column;
            gap: 10px;
            z-index: 2000;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .search-box.show {
            display: flex;
        }

        .search-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .search-input {
            width: 100%;
            padding: 8px 10px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            font-size: 14px;
            outline: none;
        }

        .search-input:focus {
            border-color: var(--accent);
        }

        .search-actions {
            display: flex;
            gap: 6px;
            margin-top: 4px;
        }

        .search-btn {
            flex: 1;
            padding: 8px;
            border: 1px solid var(--border);
            background: var(--tab-bg);
            color: var(--text);
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
        }

        .search-btn.primary {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: calc(var(--toolbar-h) + 60px);
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--accent);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            opacity: 0;
            transition: all 0.3s;
            z-index: 3000;
            pointer-events: none;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* Preview Modal */
        .preview-modal {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: none;
            flex-direction: column;
            z-index: 5000;
        }

        .preview-modal.show {
            display: flex;
        }

        .preview-header {
            height: var(--header-h);
            background: var(--header);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 12px;
        }

        .preview-frame {
            flex: 1;
            border: none;
            background: white;
        }

        input[type="file"] {
            display: none;
        }

        /* Content padding for fixed toolbar */
        .content-spacer {
            height: calc(var(--toolbar-h) + env(safe-area-inset-bottom));
            flex-shrink: 0;
        }
    </style>
</head>
<body class="dark">
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="logo">Pro</div>
            <input type="text" class="filename-input" id="filename" value="new.txt" onchange="renameFile(this.value)">
            <div class="header-btns">
                <button class="btn secondary" onclick="toggleMenu()" style="padding: 0 8px; font-size: 14px;">☰</button>
                <button class="btn" onclick="togglePreview()">▶</button>
            </div>
        </header>

        <!-- Sekmeler -->
        <div class="tabs-bar" id="tabsBar">
            <div class="tabs-list" id="tabsList"></div>
            <button class="new-tab-btn" onclick="newTab()">+</button>
        </div>

        <!-- Editor -->
        <div class="editor-area">
            <div class="line-numbers" id="lineNums">1</div>
            <div class="editor-wrap">
                <textarea id="editor" spellcheck="false" autocapitalize="off" autocomplete="off" autocorrect="off"></textarea>
            </div>
        </div>

        <!-- Content spacer for fixed toolbar -->
        <div class="content-spacer"></div>
    </div>

    <!-- Fixed Toolbar (Klavye üstünde kalır) -->
    <div class="toolbar-container">
        <div class="toolbar">
            <button class="tool-btn" onclick="insertText('\t')">Tab</button>
            <button class="tool-btn" onclick="insertText('<')">&lt;</button>
            <button class="tool-btn" onclick="insertText('>')">&gt;</button>
            <button class="tool-btn" onclick="insertText('/')">/</button>
            <button class="tool-btn" onclick="insertText('{')">{</button>
            <button class="tool-btn" onclick="insertText('}')">}</button>
            <button class="tool-btn" onclick="insertText('(')">(</button>
            <button class="tool-btn" onclick="insertText(')')">)</button>
            <button class="tool-btn" onclick="insertText(';')">;</button>
            <button class="tool-btn" onclick="insertText('=')">=</button>
            <button class="tool-btn" onclick="insertText('"')>"</button>
            <button class="tool-btn" onclick="insertText("'")>'</button>
        </div>
    </div>

    <!-- Yüzen Navigasyon - Focus kaybettirmez -->
    <div class="nav-float">
        <button class="nav-btn" onclick="scrollEditor('top')" ontouchstart="event.preventDefault()">⤒</button>
        <button class="nav-btn" onclick="scrollEditor('up')" ontouchstart="event.preventDefault()">↑</button>
        <button class="nav-btn" onclick="scrollEditor('down')" ontouchstart="event.preventDefault()">↓</button>
        <button class="nav-btn" onclick="scrollEditor('bottom')" ontouchstart="event.preventDefault()">⤓</button>
    </div>

    <!-- Menü -->
    <div class="menu-overlay" id="menuOverlay" onclick="toggleMenu()"></div>
    <div class="menu" id="mainMenu">
        <button class="menu-item" onclick="openFile()">
            <span>Aç...</span>
            <span class="key-hint">Ctrl+O</span>
        </button>
        <button class="menu-item" onclick="openZip()">
            <span>ZIP Aç...</span>
        </button>
        <button class="menu-item" onclick="saveFile()">
            <span>Kaydet</span>
            <span class="key-hint">Ctrl+S</span>
        </button>
        <button class="menu-item" onclick="saveAsZip()">
            <span>ZIP Olarak Kaydet</span>
        </button>
        <div style="height: 1px; background: var(--border); margin: 4px 0;"></div>
        <button class="menu-item" onclick="undo()">
            <span>Geri Al</span>
            <span class="key-hint">Ctrl+Z</span>
        </button>
        <button class="menu-item" onclick="redo()">
            <span>İleri Al</span>
            <span class="key-hint">Ctrl+Y</span>
        </button>
        <div style="height: 1px; background: var(--border); margin: 4px 0;"></div>
        <button class="menu-item" onclick="openSearch()">
            <span>Bul / Değiştir</span>
            <span class="key-hint">Ctrl+F</span>
        </button>
        <button class="menu-item" onclick="jumpToLine()">
            <span>Satıra Git...</span>
        </button>
        <button class="menu-item" onclick="changeFontSize()">
            <span>Yazı Boyutu</span>
        </button>
        <button class="menu-item" onclick="toggleTheme()">
            <span>Tema Değiştir</span>
        </button>
        <div style="height: 1px; background: var(--border); margin: 4px 0;"></div>
        <button class="menu-item" onclick="selectAllEditor()">Tümünü Seç</button>
        <button class="menu-item" onclick="copyText()">Kopyala</button>
        <button class="menu-item" onclick="cutText()">Kes</button>
        <button class="menu-item" onclick="pasteText()">Yapıştır</button>
        <button class="menu-item danger" onclick="clearEditor()">Tümünü Sil</button>
    </div>

    <!-- Arama -->
    <div class="menu-overlay" id="searchOverlay" onclick="closeSearch()"></div>
    <div class="search-box" id="searchBox">
        <div class="search-title">Bul ve Değiştir</div>
        <input type="text" class="search-input" id="findText" placeholder="Ara..." onkeydown="if(event.key==='Enter')findNext()">
        <input type="text" class="search-input" id="replaceText" placeholder="Değiştir...">
        <div class="search-actions">
            <button class="search-btn" onclick="closeSearch()">Kapat</button>
            <button class="search-btn" onclick="findPrev()">← Önceki</button>
            <button class="search-btn primary" onclick="findNext()">Sonraki →</button>
        </div>
        <div class="search-actions">
            <button class="search-btn" onclick="replaceOne()">Değiştir</button>
            <button class="search-btn primary" onclick="replaceAll()">Tümünü Değiştir</button>
        </div>
    </div>

    <!-- Preview -->
    <div class="preview-modal" id="previewModal">
        <div class="preview-header">
            <b>Önizleme</b>
            <button class="btn secondary" onclick="togglePreview()">Kapat</button>
        </div>
        <iframe class="preview-frame" id="previewFrame"></iframe>
    </div>

    <div class="toast" id="toast"></div>
    <input type="file" id="fileInput" accept=".txt,.html,.js,.css,.json,.md,.csv,.php,.py,.zip" onchange="handleFileSelect(event)">

    <script>
        // State
        const App = {
            tabs: [],
            activeId: null,
            counter: 0,
            history: new Map(), // tabId -> {stack:[], idx:0}
            lastSave: 0,
            currentZip: null // Aktif ZIP dosyası
        };

        const editor = document.getElementById('editor');
        const lineNums = document.getElementById('lineNums');
        const filename = document.getElementById('filename');

        // Toast
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        // Line numbers
        function updateLines() {
            const lines = editor.value.split('\n').length;
            lineNums.innerHTML = Array(lines).fill(0).map((_,i) => i+1).join('<br>');
        }

        // Tab System
        function newTab(name='new.txt', content='', zipEntry=null) {
            App.counter++;
            const id = App.counter;
            App.tabs.push({id, name, content, zipEntry});
            App.history.set(id, {stack:[content], idx:0});
            renderTabs();
            switchTab(id);
        }

        function renderTabs() {
            const list = document.getElementById('tabsList');
            list.innerHTML = '';
            App.tabs.forEach(tab => {
                const div = document.createElement('div');
                div.className = 'tab ' + (tab.id===App.activeId?'active':'');
                div.innerHTML = `<span class="tab-name">${tab.name}</span><span class="tab-close" onclick="closeTab(${tab.id},event)">×</span>`;
                div.onclick = (e) => {
                    if(!e.target.classList.contains('tab-close')) switchTab(tab.id);
                };
                list.appendChild(div);
            });
        }

        function switchTab(id) {
            const current = App.tabs.find(t => t.id === App.activeId);
            if(current) current.content = editor.value;
            
            App.activeId = id;
            const tab = App.tabs.find(t => t.id === id);
            if(!tab) return;
            
            editor.value = tab.content;
            filename.value = tab.name;
            updateLines();
            renderTabs();
            
            // Restore cursor pos
            const hist = App.history.get(id);
            if(hist) {
                editor.setSelectionRange(hist.cursor||0, hist.cursor||0);
            }
        }

        function closeTab(id, e) {
            e.stopPropagation();
            if(App.tabs.length<=1) return;
            App.tabs = App.tabs.filter(t => t.id!==id);
            if(App.activeId===id) switchTab(App.tabs[0].id);
            else renderTabs();
        }

        // Editor Input with History throttling
        let inputTimer;
        editor.addEventListener('input', () => {
            updateLines();
            clearTimeout(inputTimer);
            inputTimer = setTimeout(saveHistory, 500); // 500ms debounce
            
            const tab = App.tabs.find(t => t.id===App.activeId);
            if(tab) tab.content = editor.value;
        });

        editor.addEventListener('scroll', () => {
            lineNums.scrollTop = editor.scrollTop;
        });

        // History (Undo/Redo)
        function saveHistory() {
            const tab = App.tabs.find(t => t.id===App.activeId);
            if(!tab) return;
            
            const h = App.history.get(tab.id);
            if(!h) return;
            
            // Aynı içerikse ekleme
            if(h.stack[h.idx] === editor.value) return;
            
            // Sonraki history'yi sil
            if(h.idx < h.stack.length-1) {
                h.stack = h.stack.slice(0, h.idx+1);
            }
            
            h.stack.push(editor.value);
            h.idx++;
            
            // Limit 50
            if(h.stack.length>50) {
                h.stack.shift();
                h.idx--;
            }
            
            // Cursor pozisyonu kaydet
            h.cursor = editor.selectionStart;
        }

        function undo() {
            const tab = App.tabs.find(t => t.id===App.activeId);
            if(!tab) return;
            const h = App.history.get(tab.id);
            if(!h || h.idx<=0) {
                showToast('Geri alma yok');
                return;
            }
            h.idx--;
            editor.value = h.stack[h.idx];
            tab.content = editor.value;
            updateLines();
            showToast('Geri alındı');
        }

        function redo() {
            const tab = App.tabs.find(t => t.id===App.activeId);
            if(!tab) return;
            const h = App.history.get(tab.id);
            if(!h || h.idx>=h.stack.length-1) {
                showToast('İleri alma yok');
                return;
            }
            h.idx++;
            editor.value = h.stack[h.idx];
            tab.content = editor.value;
            updateLines();
            showToast('İleri alındı');
        }

        // Toolbar Insert
        function insertText(text) {
            const start = editor.selectionStart;
            const end = editor.selectionEnd;
            editor.setRangeText(text, start, end, 'end');
            editor.focus();
            editor.dispatchEvent(new Event('input'));
        }

        // File Operations
        function renameFile(name) {
            const tab = App.tabs.find(t => t.id===App.activeId);
            if(tab) tab.name = name;
            renderTabs();
        }

        function openFile() {
            document.getElementById('fileInput').click();
            toggleMenu();
        }

        function handleFileSelect(e) {
            const file = e.target.files[0];
            if(!file) return;
            
            if(file.name.endsWith('.zip')) {
                loadZip(file);
            } else {
                const reader = new FileReader();
                reader.onload = (evt) => {
                    newTab(file.name, evt.target.result);
                    showToast(`${file.name} açıldı`);
                };
                reader.readAsText(file);
            }
            e.target.value = '';
        }

        // ZIP Operations
        async function loadZip(file) {
            try {
                const zip = await JSZip.loadAsync(file);
                App.currentZip = zip;
                
                // İlk dosyayı aç
                const files = Object.keys(zip.files).filter(f => !zip.files[f].dir);
                if(files.length>0) {
                    const first = files[0];
                    const content = await zip.files[first].async('string');
                    newTab(first, content, first);
                    showToast(`${file.name} açıldı (${files.length} dosya)`);
                }
            } catch(err) {
                showToast('ZIP açılamadı');
                console.error(err);
            }
        }

        function openZip() {
            const input = document.getElementById('fileInput');
            input.accept = '.zip';
            input.click();
            toggleMenu();
        }

        async function saveAsZip() {
            const tab = App.tabs.find(t => t.id===App.activeId);
            if(!tab) return;
            
            const zip = new JSZip();
            zip.file(tab.name, editor.value);
            
            const blob = await zip.generateAsync({type:'blob'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = tab.name.replace(/\.[^/.]+$/, '') + '.zip';
            a.click();
            URL.revokeObjectURL(url);
            showToast('ZIP olarak kaydedildi');
            toggleMenu();
        }

        function saveFile() {
            const tab = App.tabs.find(t => t.id===App.activeId);
            if(!tab) return;
            
            // ZIP içindeki dosyayı güncelle
            if(tab.zipEntry && App.currentZip) {
                App.currentZip.file(tab.zipEntry, editor.value);
                showToast('ZIP içinde güncellendi (Kaydete basarak indirin)');
            } else {
                const blob = new Blob([editor.value], {type:'text/plain'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = tab.name;
                a.click();
                URL.revokeObjectURL(url);
                showToast('İndirildi');
            }
            toggleMenu();
        }

        // Menu
        function toggleMenu() {
            const m = document.getElementById('mainMenu');
            const o = document.getElementById('menuOverlay');
            const isOpen = m.classList.contains('show');
            if(isOpen) {
                m.classList.remove('show');
                o.classList.remove('show');
            } else {
                m.classList.add('show');
                o.classList.add('show');
            }
        }

        // Search - Görünür scroll
        function openSearch() {
            document.getElementById('searchBox').classList.add('show');
            document.getElementById('searchOverlay').classList.add('show');
            document.getElementById('findText').focus();
            toggleMenu();
        }

        function closeSearch() {
            document.getElementById('searchBox').classList.remove('show');
            document.getElementById('searchOverlay').classList.remove('show');
        }

        function findNext() {
            const text = document.getElementById('findText').value;
            if(!text) return;
            
            const content = editor.value;
            const start = editor.selectionEnd;
            let idx = content.indexOf(text, start);
            
            if(idx===-1) {
                idx = content.indexOf(text); // Baştan başla
                if(idx===-1) {
                    showToast('Bulunamadı');
                    return;
                }
            }
            
            editor.setSelectionRange(idx, idx+text.length);
            editor.focus();
            
            // Görünür yap - Satırı hesapla ve scroll
            const lines = content.substring(0, idx).split('\n').length;
            const lineHeight = 21; // yaklaşık
            const scrollPos = (lines-1) * lineHeight - editor.clientHeight/2;
            editor.scrollTop = Math.max(0, scrollPos);
        }

        function findPrev() {
            const text = document.getElementById('findText').value;
            if(!text) return;
            
            const content = editor.value;
            const start = editor.selectionStart - 1;
            let idx = content.lastIndexOf(text, start);
            
            if(idx===-1) {
                idx = content.lastIndexOf(text); // Sondan başla
                if(idx===-1) {
                    showToast('Bulunamadı');
                    return;
                }
            }
            
            editor.setSelectionRange(idx, idx+text.length);
            editor.focus();
            
            const lines = content.substring(0, idx).split('\n').length;
            const lineHeight = 21;
            const scrollPos = (lines-1) * lineHeight - editor.clientHeight/2;
            editor.scrollTop = Math.max(0, scrollPos);
        }

        function replaceOne() {
            const find = document.getElementById('findText').value;
            const replace = document.getElementById('replaceText').value;
            if(!find) return;
            
            const sel = editor.value.substring(editor.selectionStart, editor.selectionEnd);
            if(sel===find) {
                editor.setRangeText(replace, editor.selectionStart, editor.selectionEnd, 'end');
                editor.dispatchEvent(new Event('input'));
                findNext();
            } else {
                findNext();
            }
        }

        function replaceAll() {
            const find = document.getElementById('findText').value;
            const replace = document.getElementById('replaceText').value;
            if(!find) return;
            
            const original = editor.value;
            const regex = new RegExp(find.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'g');
            const result = original.replace(regex, replace);
            
            if(original!==result) {
                editor.value = result;
                editor.dispatchEvent(new Event('input'));
                showToast(`${original.split(find).length-1} değişiklik yapıldı`);
            }
        }

        function jumpToLine() {
            const line = prompt('Satır numarası:');
            if(!line) return;
            
            const num = parseInt(line);
            if(isNaN(num)) return;
            
            const lines = editor.value.split('\n');
            if(num<1 || num>lines.length) {
                showToast('Geçersiz satır');
                return;
            }
            
            let pos = 0;
            for(let i=0; i<num-1; i++) pos += lines[i].length + 1;
            
            editor.setSelectionRange(pos, pos);
            editor.focus();
            editor.scrollTop = (num-1) * 21 - editor.clientHeight/2;
        }

        // Navigation - Focus kaybettirmez
        function scrollEditor(dir) {
            const lineHeight = 21;
            const visibleLines = Math.floor(editor.clientHeight / lineHeight);
            
            switch(dir) {
                case 'top':
                    editor.scrollTo({top:0, behavior:'smooth'});
                    editor.setSelectionRange(0,0);
                    break;
                case 'bottom':
                    editor.scrollTo({top:editor.scrollHeight, behavior:'smooth'});
                    const len = editor.value.length;
                    editor.setSelectionRange(len,len);
                    break;
                case 'up':
                    editor.scrollBy({top: -visibleLines*lineHeight + 20, behavior:'smooth'});
                    break;
                case 'down':
                    editor.scrollBy({top: visibleLines*lineHeight - 20, behavior:'smooth'});
                    break;
            }
            // Focus'u koruma - isteğe bağlı, yorum satırı yapabilirsiniz
            // editor.focus(); 
        }

        // Selection & Clipboard
        function selectAllEditor() {
            editor.focus();
            editor.select();
            toggleMenu();
        }

        function copyText() {
            const sel = editor.value.substring(editor.selectionStart, editor.selectionEnd);
            if(sel) {
                navigator.clipboard.writeText(sel);
                showToast('Kopyalandı');
            }
            toggleMenu();
        }

        function cutText() {
            const start = editor.selectionStart;
            const end = editor.selectionEnd;
            const sel = editor.value.substring(start, end);
            if(sel) {
                navigator.clipboard.writeText(sel);
                editor.setRangeText('', start, end, 'end');
                editor.dispatchEvent(new Event('input'));
                showToast('Kesildi');
            }
            toggleMenu();
        }

        function pasteText() {
            navigator.clipboard.readText().then(text => {
                const start = editor.selectionStart;
                const end = editor.selectionEnd;
                editor.setRangeText(text, start, end, 'end');
                editor.dispatchEvent(new Event('input'));
                showToast('Yapıştırıldı');
            }).catch(() => showToast('Erişim reddedildi'));
            toggleMenu();
        }

        function clearEditor() {
            if(confirm('Tüm içerik silinsin mi?')) {
                editor.value = '';
                editor.dispatchEvent(new Event('input'));
            }
            toggleMenu();
        }

        // UI
        function changeFontSize() {
            const sizes = [12,13,14,15,16,18];
            const current = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--font-size'));
            const idx = sizes.indexOf(current);
            const next = sizes[(idx+1)%sizes.length];
            document.documentElement.style.setProperty('--font-size', next+'px');
            localStorage.setItem('editor_font', next);
            showToast('Boyut: '+next+'px');
            toggleMenu();
        }

        function toggleTheme() {
            document.body.classList.toggle('light');
            const isLight = document.body.classList.contains('light');
            localStorage.setItem('editor_theme', isLight?'light':'dark');
            showToast(isLight?'Açık Tema':'Koyu Tema');
            toggleMenu();
        }

        function togglePreview() {
            const modal = document.getElementById('previewModal');
            const frame = document.getElementById('previewFrame');
            const isOpen = modal.classList.contains('show');
            
            if(!isOpen) {
                const name = filename.value;
                const content = editor.value;
                
                if(name.endsWith('.html') || name.endsWith('.htm')) {
                    frame.srcdoc = content;
                } else {
                    frame.srcdoc = `<pre style="padding:20px;font-family:monospace;white-space:pre-wrap;word-wrap:break-word;">${content.replace(/</g,'&lt;')}</pre>`;
                }
                modal.classList.add('show');
            } else {
                modal.classList.remove('show');
                frame.srcdoc = '';
            }
        }

        // Keyboard Shortcuts
        editor.addEventListener('keydown', (e) => {
            if(e.key==='Tab') {
                e.preventDefault();
                insertText('    ');
            }
            
            if(e.ctrlKey || e.metaKey) {
                switch(e.key.toLowerCase()) {
                    case 's': e.preventDefault(); if(e.shiftKey) saveAsZip(); else saveFile(); break;
                    case 'o': e.preventDefault(); openFile(); break;
                    case 'z': e.preventDefault(); undo(); break;
                    case 'y': e.preventDefault(); redo(); break;
                    case 'f': e.preventDefault(); openSearch(); break;
                    case 'a': e.preventDefault(); selectAllEditor(); break;
                    case 'n': e.preventDefault(); newTab(); break;
                }
            }
        });

        // Init
        window.onload = () => {
            if(localStorage.getItem('editor_theme')==='light') {
                document.body.classList.remove('dark');
                document.body.classList.add('light');
            }
            const fs = localStorage.getItem('editor_font');
            if(fs) document.documentElement.style.setProperty('--font-size', fs+'px');
            
            newTab();
            
            // iOS Klavye handling
            if(/iPad|iPhone|iPod/.test(navigator.userAgent)) {
                window.addEventListener('resize', () => {
                    // Klavye açılınca scroll ayarı
                    setTimeout(() => {
                        document.body.scrollTop = 0;
                    }, 100);
                });
            }
        };

        // Before unload
        window.onbeforeunload = () => {
            const hasContent = App.tabs.some(t => t.content && t.content.length>0);
            if(hasContent) return 'Kaydedilmemiş değişiklikler var.';
        };
    </script>
</body>
</html>
