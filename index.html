<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>AlpEditör</title>
    <link rel="manifest" href="manifest.json">
    <style>
        /* iPhone (iOS) Stili CSS */
        :root {
            --ios-bg: #f2f2f7;
            --ios-header: #f8f8f8;
            --ios-blue: #007AFF;
            --ios-border: #c6c6c8;
            --ios-text: #000000;
            --ios-menu-bg: rgba(30, 30, 30, 0.85);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--ios-bg);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        header {
            background-color: var(--ios-header);
            border-bottom: 1px solid var(--ios-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            padding-top: max(10px, env(safe-area-inset-top));
        }

        .toolbar {
            background-color: var(--ios-header);
            border-bottom: 1px solid var(--ios-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 15px;
        }

        .btn {
            color: var(--ios-blue);
            background: transparent;
            border: none;
            font-size: 17px;
            cursor: pointer;
            padding: 5px;
            margin: 0;
            outline: none;
        }

        .btn:active {
            opacity: 0.5;
        }

        .title {
            font-size: 17px;
            font-weight: 600;
            color: var(--ios-text);
            flex: 1;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding: 0 10px;
        }

        textarea {
            flex: 1;
            width: 100%;
            border: none;
            padding: 15px;
            font-size: 16px;
            font-family: monospace;
            background-color: #ffffff;
            color: var(--ios-text);
            resize: none;
            outline: none;
            box-sizing: border-box;
            -webkit-appearance: none;
        }

        input[type="file"] {
            display: none;
        }

        /* iOS Stili Açılır Menü (Kopyala/Yapıştır) */
        .ios-context-menu {
            position: absolute;
            background-color: var(--ios-menu-bg);
            border-radius: 10px;
            display: flex;
            flex-direction: row;
            padding: 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 1000;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: opacity 0.2s ease, transform 0.2s ease;
            transform: scale(0.95);
            opacity: 0;
            pointer-events: none;
        }

        .ios-context-menu.active {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }

        .ios-context-menu button {
            background: none;
            border: none;
            color: white;
            font-size: 14px;
            padding: 10px 14px;
            cursor: pointer;
            white-space: nowrap;
        }

        .ios-context-menu button:active {
            background-color: rgba(255, 255, 255, 0.2);
        }

        .ios-context-menu .divider {
            width: 1px;
            background-color: rgba(255, 255, 255, 0.2);
            margin: 5px 0;
        }
    </style>
</head>
<body>

    <header>
        <button class="btn" id="btnOpen">Aç</button>
        <div class="title" id="fileNameDisplay">İsimsiz.txt</div>
        <button class="btn" id="btnSave" style="font-weight: 600;">Kaydet</button>
    </header>

    <div class="toolbar">
        <button class="btn" id="btnSaveAs">Farklı Kaydet</button>
        <div>
            <button class="btn" id="btnUndo" style="margin-right: 15px;">Geri Al</button>
            <button class="btn" id="btnRedo">İleri Al</button>
        </div>
    </div>

    <textarea id="editor" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="none"></textarea>
    <input type="file" id="fileInput" accept=".txt,.html,.js,.css,.json,.md,.csv">

    <div id="iosMenu" class="ios-context-menu">
        <button id="menuCut">Kes</button>
        <div class="divider"></div>
        <button id="menuCopy">Kopyala</button>
        <div class="divider"></div>
        <button id="menuPaste">Yapıştır</button>
        <div class="divider"></div>
        <button id="menuDelete">Sil</button>
        <div class="divider"></div>
        <button id="menuSelectAll">Tümünü Seç</button>
    </div>

    <script>
        // DOM Elementleri
        const editor = document.getElementById('editor');
        const fileInput = document.getElementById('fileInput');
        const fileNameDisplay = document.getElementById('fileNameDisplay');
        const btnOpen = document.getElementById('btnOpen');
        const btnSave = document.getElementById('btnSave');
        const btnSaveAs = document.getElementById('btnSaveAs');
        const btnUndo = document.getElementById('btnUndo');
        const btnRedo = document.getElementById('btnRedo');

        // Menü Elementleri
        const iosMenu = document.getElementById('iosMenu');
        const menuCut = document.getElementById('menuCut');
        const menuCopy = document.getElementById('menuCopy');
        const menuPaste = document.getElementById('menuPaste');
        const menuDelete = document.getElementById('menuDelete');
        const menuSelectAll = document.getElementById('menuSelectAll');

        // Durum Değişkenleri
        let currentFileName = "İsimsiz.txt";
        let historyStack = [''];
        let historyIndex = 0;
        let isProgrammaticChange = false;

        // Geçmiş İşlemleri
        editor.addEventListener('input', () => {
            if (isProgrammaticChange) {
                isProgrammaticChange = false;
                return;
            }
            if (historyIndex < historyStack.length - 1) {
                historyStack = historyStack.slice(0, historyIndex + 1);
            }
            historyStack.push(editor.value);
            historyIndex++;
        });

        function updateEditorValue(newValue) {
            isProgrammaticChange = true;
            editor.value = newValue;
            editor.dispatchEvent(new Event('input')); 
        }

        btnUndo.addEventListener('click', () => {
            if (historyIndex > 0) {
                historyIndex--;
                isProgrammaticChange = true;
                editor.value = historyStack[historyIndex];
            }
        });

        btnRedo.addEventListener('click', () => {
            if (historyIndex < historyStack.length - 1) {
                historyIndex++;
                isProgrammaticChange = true;
                editor.value = historyStack[historyIndex];
            }
        });

        // Dosya İşlemleri
        btnOpen.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (!file) return;

            currentFileName = file.name;
            fileNameDisplay.textContent = currentFileName;

            const reader = new FileReader();
            reader.onload = (e) => {
                const content = e.target.result;
                updateEditorValue(content);
                historyStack = [content];
                historyIndex = 0;
            };
            reader.readAsText(file);
            fileInput.value = '';
        });

        function downloadFile(filename, content) {
            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            setTimeout(() => {
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }, 0);
        }

        btnSave.addEventListener('click', () => downloadFile(currentFileName, editor.value));

        btnSaveAs.addEventListener('click', () => {
            const newFileName = prompt("Dosya adını girin (uzantısıyla birlikte, örn: index.html):", currentFileName);
            if (newFileName && newFileName.trim() !== "") {
                currentFileName = newFileName.trim();
                fileNameDisplay.textContent = currentFileName;
                downloadFile(currentFileName, editor.value);
            }
        });

        // --- İOS STİLİ MENÜ İŞLEMLERİ ---

        // Sağ Tık veya Uzun Basma Algılama
        editor.addEventListener('contextmenu', (e) => {
            e.preventDefault(); // Varsayılan menüyü engelle
            
            // Menüyü dokunulan yere konumlandır
            let x = e.pageX;
            let y = e.pageY - 50; // Parmağın biraz üstünde çıksın
            
            // Menü ekrandan taşmasın diye kontrol
            if (x + 300 > window.innerWidth) x = window.innerWidth - 300;
            if (y < 10) y = e.pageY + 20; // Üstten taşarsa alta al

            iosMenu.style.left = `${x}px`;
            iosMenu.style.top = `${y}px`;
            iosMenu.classList.add('active');
        });

        // Menü dışına tıklanınca menüyü kapat
        document.addEventListener('click', (e) => {
            if (!iosMenu.contains(e.target) && e.target !== editor) {
                iosMenu.classList.remove('active');
            }
        });
        editor.addEventListener('click', () => iosMenu.classList.remove('active'));
        editor.addEventListener('scroll', () => iosMenu.classList.remove('active'));

        // Menü Buton Fonksiyonları
        menuSelectAll.addEventListener('click', () => {
            editor.focus();
            editor.select();
            iosMenu.classList.remove('active');
        });

        menuCopy.addEventListener('click', () => {
            const selectedText = editor.value.substring(editor.selectionStart, editor.selectionEnd);
            if (selectedText) navigator.clipboard.writeText(selectedText);
            iosMenu.classList.remove('active');
            editor.focus();
        });

        menuCut.addEventListener('click', () => {
            const start = editor.selectionStart;
            const end = editor.selectionEnd;
            const selectedText = editor.value.substring(start, end);
            if (selectedText) {
                navigator.clipboard.writeText(selectedText).then(() => {
                    editor.setRangeText('', start, end, 'end');
                    updateEditorValue(editor.value);
                });
            }
            iosMenu.classList.remove('active');
            editor.focus();
        });

        menuPaste.addEventListener('click', async () => {
            try {
                const text = await navigator.clipboard.readText();
                const start = editor.selectionStart;
                const end = editor.selectionEnd;
                editor.setRangeText(text, start, end, 'end');
                updateEditorValue(editor.value);
            } catch (err) {
                alert("Panoya erişim reddedildi. Lütfen tarayıcı izinlerini kontrol edin.");
            }
            iosMenu.classList.remove('active');
            editor.focus();
        });

        menuDelete.addEventListener('click', () => {
            const start = editor.selectionStart;
            const end = editor.selectionEnd;
            if (start !== end) {
                editor.setRangeText('', start, end, 'end');
                updateEditorValue(editor.value);
            }
            iosMenu.classList.remove('active');
            editor.focus();
        });

        // Service Worker Kaydı (PWA için)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(registration => console.log('SW kayıtlı:', registration.scope))
                    .catch(error => console.log('SW kayıt hatası:', error));
            });
        }
    </script>
</body>
</html>
